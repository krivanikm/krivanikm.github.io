<!doctype html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body class="login-body">

  <div class="row vh-100 g-0">
    <div class="col-lg-6 d-none d-lg-block position-relative left-image-side">
      <div class="bg-holder" style="background-image: url('../img/1129351-sunlight-landscape-forest-nature-spruce-wilderness-jungle-tree-autumn-season-trail-woodland-grove-habitat-natural-environment-woody-plant-geographical-feature-ecosystem.jpg');"></div>
      <div class="image-overlay"></div>
    </div>

    <div class="col-lg-6 login-form-container">
      <div class="row align-items-center justify-content-center h-100 g-0 px-4 px-sm-0">
        <div class="col col-sm-8 col-lg-8 col-xl-7">
          
          <div class="text-center mb-4">
            <div class="brand d-inline-flex align-items-center justify-content-center">
              <span class="dot"></span>
              <span><span class="mute">Auth</span></span>
            </div>
          </div>

          <div class="text-center mb-4">
            <h3 class="fw-bold text-lowercase">access_control.init</h3>
            <p class="text-soft font-mono">Zadaj prístupové tokeny na overenie identity.</p>
          </div>

          <div class="mb-4">
            <button class="btn-terminal-outline w-100 mb-2 d-flex align-items-center justify-content-center">
              <i class="bi bi-google me-2"></i> <span>auth via google</span>
            </button>
            <button class="btn-terminal-outline w-100 mb-2 d-flex align-items-center justify-content-center">
              <i class="bi bi-github me-2"></i> <span>auth via github</span>
            </button>
          </div>

          <div class="position-relative my-4 d-flex align-items-center justify-content-center">
            <span class="divider-line w-100"></span>
            <span class="divider-text px-3">OR</span>
          </div>

          <form action="/html/metrics.html">
            <div class="input-group-custom mb-3">
              <span class="icon-label"><i class="bi bi-person"></i></span>
              <input type="text" placeholder="username" required>
            </div>
            
            <div class="input-group-custom mb-3">
              <span class="icon-label"><i class="bi bi-lock"></i></span>
              <input type="password" placeholder="password" required>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 font-mono fs-7">
              <div class="form-check-custom">
                <input type="checkbox" id="remember">
                <label for="remember">remember_session</label>
              </div>
            </div>

            <button type="submit" class="btn-custom w-100 text-center mb-4">execute login →</button>
          </form>

          <div class="text-center font-mono fs-7">
            <span class="text-soft">Nemáš účet?</span>
            <a href="/html/register.html" class="matrix-link ms-1">register.exe</a>
          </div>

        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
